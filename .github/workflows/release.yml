name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  VCPKG_DEFAULT_TRIPLET: x64-windows

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows binary
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libheif + dav1d (vcpkg preinstalled on runner)
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install libheif:x64-windows dav1d:x64-windows

      - name: Install pkg-config
        run: choco install -y pkgconfiglite

      - name: Build release
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          $env:PKG_CONFIG_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig"
          cargo build --release

      - name: Stage artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target\release\heico.exe dist\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\heif.dll" dist\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\libde265.dll" dist\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\libx265.dll" dist\ -ErrorAction SilentlyContinue
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\dav1d.dll" dist\
          Copy-Item installer\install.ps1 dist\
          Copy-Item installer\uninstall.ps1 dist\
          Copy-Item README.md dist\
          Copy-Item LICENSE dist\

      - name: Zip artifacts
        run: Compress-Archive -Path dist\* -DestinationPath heico-${{ github.ref_name }}-x64-windows.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: heico-${{ github.ref_name }}-x64-windows.zip
          generate_release_notes: true
