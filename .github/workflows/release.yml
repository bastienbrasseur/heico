name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  VCPKG_DEFAULT_TRIPLET: x64-windows

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libheif + dav1d
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install libheif:x64-windows dav1d:x64-windows

      - name: Install pkg-config + Inno Setup
        run: choco install -y pkgconfiglite innosetup

      - name: Build release
        shell: pwsh
        run: |
          # pkg-config (dav1d-sys) introuvable sans refresh PATH apres choco.
          $env:PATH = "C:\ProgramData\chocolatey\bin;$env:PATH"
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          $env:PKG_CONFIG_PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\lib\pkgconfig"
          cargo build --release

      - name: Stage installer inputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path installer\build | Out-Null
          Copy-Item target\release\heico.exe installer\build\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\heif.dll" installer\build\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\libde265.dll" installer\build\
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\libx265.dll" installer\build\ -ErrorAction SilentlyContinue
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\dav1d.dll" installer\build\

      - name: Compile installer with Inno Setup
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion=$version installer\heico.iss

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/HeicoSetup-*.exe
          generate_release_notes: true
